name: TracePack Evidence

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  TracePack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TracePack CLI
        run: npm run build

      - name: TracePack start
        run: node dist/cli.js start --label "github-actions-${{ github.run_id }}"

      - name: TracePack run validation
        continue-on-error: true
        run: node dist/cli.js run -- npm test

      - name: TracePack finish
        if: always()
        run: node dist/cli.js finish

      - name: Locate latest TracePack bundle
        if: always()
        id: bundle
        shell: bash
        run: |
          bundle="$(ls -td .tracepack/* | head -1)"
          echo "path=$bundle" >> "$GITHUB_OUTPUT"
          echo "TRACEPACK_BUNDLE=$bundle" >> "$GITHUB_ENV"

      - name: TracePack report exports
        if: always()
        run: node dist/cli.js report "$TRACEPACK_BUNDLE" --format all

      - name: TracePack policy assertion
        if: always()
        run: >-
          node dist/cli.js assert "$TRACEPACK_BUNDLE" --require-verdict validated_final_state
          --require-confidence complete --summary-out "$TRACEPACK_BUNDLE/assertion.json"

      - name: TracePack job summary
        if: always()
        shell: bash
        run: |
          {
            echo "### TracePack evidence"
            echo ""
            echo "Uploaded artifact: TracePack-evidence-${{ github.run_id }}"
            echo ""
            echo "The bundle contains manifest.json, redaction-report.json, report.html, report.md, summary.json, and assertion.json when assertion ran."
            echo ""
            echo "TracePack assertion checks observed evidence only; it does not prove correctness, security, approval, or merge readiness."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TracePack bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TracePack-evidence-${{ github.run_id }}
          path: ${{ steps.bundle.outputs.path }}
          if-no-files-found: error
